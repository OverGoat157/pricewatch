services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pricewatch
      POSTGRES_PASSWORD: pricewatch
      POSTGRES_DB: pricewatch
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricewatch"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Наружу не публикуем — доступ только внутри docker-сети (нет конфликтов портов).

  backend:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://pricewatch:pricewatch@db:5432/pricewatch?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME:-}
      CHECK_INTERVAL_MINUTES: ${CHECK_INTERVAL_MINUTES:-30}
    depends_on:
      db:
        condition: service_healthy
    # Внутренний сервис: запросы идут через nginx фронтенда (/api).

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  pgdata:
